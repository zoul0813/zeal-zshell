<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeal Native WASM Emulator</title>
    <link rel="stylesheet" href="index.css" />
    <script src="zeal.elf.js"></script>
</head>
<body>
    <header>
        <h1>ZShell + coreutils</h1>
        <button id="btn-reset">Reset</button>
        <button id="btn-unmute">Unmute</button>
        <button id="btn-toggle-fps">Toggle FPS</button>
        <button id="btn-clear">Clear Data</button>
        <button id="btn-save">Save Data</button>
    </header>
    <main class="viewport">
        <h1>Loading ...</h1>
        <canvas id="canvas" class="smooth" tabindex="0" width="640" height="480"></canvas>
    </main>
    <footer>
        <button id="btn-load">Load</button>
    </footer>
    <script src="index.js"></script>
</body>
</html>
